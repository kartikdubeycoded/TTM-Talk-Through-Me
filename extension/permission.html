<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>SignToText — Camera Access</title>
  <style>
    body { font-family: system-ui, sans-serif; background: #111; color: #eee;
           display: grid; place-items: center; height: 100vh; margin: 0; }
    .card { max-width: 420px; text-align: center; padding: 32px;
            background: #1c1c22; border-radius: 16px; }
    button { background: #6d5dfc; color: white; border: 0; padding: 12px 28px;
             border-radius: 8px; font-size: 15px; cursor: pointer; margin-top: 16px; }
    #status { margin-top: 14px; font-size: 14px; color: #9a9aa5; }
  </style>
</head>
<body>
  <div class="card">
    <h2>SignToText needs your camera</h2>
    <p>Your video is processed entirely on this machine and never leaves it.
       Grant access once and you're set.</p>
    <button id="grant">Allow camera</button>
    <div id="status"></div>
  </div>
  <script src="permission.js"></script>
</body>
</html>
